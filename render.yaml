services:
  - type: web
    name: phoenix-innovative
    runtime: node
    repo: https://github.com/yourusername/phoenix-innovative-website
    plan: free
    region: oregon
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CONTACT_EMAIL
        sync: false